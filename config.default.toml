# ── Lord of Heroes Blog Scrapper — 기본 설정 ─────────────────────────────
# config.toml 로 복사한 뒤 원하는 값만 수정하세요.
# config.toml 이 없으면 이 파일의 값이 사용됩니다.

# ── 경로 ──────────────────────────────────────────────────────────────────
[paths]
# 산출물 디렉토리 (절대 경로 권장, 상대 경로 시 프로젝트 루트 기준)
output_dir = "loh_blog"

# ── 네트워크 ──────────────────────────────────────────────────────────────
[network]
default_max_workers = 8
blog_rate_limit = 10.0        # 대규모 배치 (>100건) req/s
blog_rate_limit_small = 20.0  # 소규모 배치 (≤100건) req/s
default_timeout = 20          # 기본 HTTP 요청 타임아웃 (초)
retry_delays = [1, 2]         # 재시도 대기 시간 (초)
max_retries = 3

# ── URL / 도메인 ─────────────────────────────────────────────────────────
[urls]
blog_host = "blog-ko.lordofheroes.com"
# blog_base, blog_image_prefix, sitemap URL 등은 blog_host 에서 자동 파생
wayback_cdx_api = "https://web.archive.org/cdx/search/cdx"
gdrive_hosts = ["drive.google.com", "docs.google.com"]  # *.googleusercontent.com 은 자동 인식
skip_link_hosts = ["forms.gle", "forms.google.com", "play.google.com", "apps.apple.com", "go.onelink.me"]

[urls.cdn]
community = "community-ko-cdn.lordofheroes.com"
community_site = "community-ko.lordofheroes.com"
game = "cdn.clovergames.io"

[urls.kakao]
profile_id = "_YXZqxb"
# api URL 은 profile_id 에서 파생
title_similarity_threshold = 0.55

[urls.multilang.en]
blog_host = "blog-en.lordofheroes.com"
earliest_date = "2020-10-20"

[urls.multilang.ja]
blog_host = "blog-ja.lordofheroes.com"
earliest_date = "2021-01-15"

# ── 카테고리 ──────────────────────────────────────────────────────────────
[categories]
# 유효 카테고리 (KO 기준)
valid = [
    "공지사항", "이벤트", "갤러리", "유니버스", "아발론서고",
    "쿠폰", "아발론 이벤트", "Special", "가이드", "확률 정보",
]

# tag slug → 다국어 카테고리명
[categories.tags.notices]
ko = "공지사항"
en = "Notice"
ja = "お知らせ"

[categories.tags.events]
ko = "이벤트"
en = "Event"
ja = "イベント"

[categories.tags.gallery]
ko = "갤러리"
en = "Gallery"
ja = "ユニバース"

[categories.tags.universe]
ko = "유니버스"
en = "Universe"
ja = "英雄紹介"

[categories.tags.library]
ko = "아발론서고"
en = "Gallery"
ja = "ユニバース"

[categories.tags.coupon]
ko = "쿠폰"
en = "Coupon"
ja = "クーポン"

# EN/JA 잔존 태그 → 정규 카테고리로 정규화
[categories.normalize.en]
"New Hero" = "Universe"
avillontoon = "Gallery"

[categories.normalize.ja]
"漫画" = "ユニバース"
"Event-Completed" = "イベント"

# ── 이미지 오버라이드 ─────────────────────────────────────────────────────
[image_overrides]
# 영구 깨진 URL = "동일 이미지의 블로그 URL"
# "https://lh3.googleusercontent.com/broken..." = "https://blog-ko.lordofheroes.com/content/images/..."

# ── 파일 타입 ─────────────────────────────────────────────────────────────
[file_types]
img_exts = [".png", ".jpg", ".jpeg", ".gif", ".webp", ".bmp", ".svg"]
archive_exts = [".zip", ".rar", ".7z", ".tar", ".gz", ".tgz"]
video_exts = [".mp4", ".webm", ".mov", ".mkv", ".m4v"]
audio_exts = [".mp3", ".wav", ".ogg", ".m4a", ".flac", ".aac"]
dl_keywords = [
    "다운로드", "download", "다운", "받기", "저장",
    "고화질 이미지", "고화질", "이미지", "원본",
]
non_image_context_keywords = ["bgm", "ost", "음악", "사운드트랙", "soundtrack"]
